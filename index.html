<style>
  :root{
    --primary:#6b1f2a;
    --primary-light:#8b2f3a;
    --primary-dark:#4a1520;
    --gold:#b8943f;
    --gold-light:#d4af37;
    --cream:#faf7f0;
    --ivory:#fffef9;
    --sage:#5a7a5a;
    --charcoal:#1a1a1a;
    --muted:#6b6b6b;
    --border:#e8e0d4;
  }
  *{box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--charcoal);margin:0}
  .font-serif{font-family:'Cormorant Garamond',serif}
  .scrollbar-thin::-webkit-scrollbar{width:6px;height:6px}
  .scrollbar-thin::-webkit-scrollbar-track{background:transparent}
  .scrollbar-thin::-webkit-scrollbar-thumb{background:rgba(107,31,42,0.3);border-radius:3px}
  .scrollbar-thin::-webkit-scrollbar-thumb:hover{background:rgba(107,31,42,0.5)}
  
  .sidebar-link{transition:all .2s ease;position:relative}
  .sidebar-link:hover{background:rgba(184,148,63,0.1)}
  .sidebar-link.active{background:linear-gradient(90deg,rgba(107,31,42,0.12),transparent);color:var(--primary)}
  .sidebar-link.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
  
  .card{background:var(--ivory);border:1px solid var(--border);border-radius:12px;box-shadow:0 1px 3px rgba(107,31,42,0.04)}
  .card-hover{transition:all .25s ease}
  .card-hover:hover{box-shadow:0 8px 25px rgba(107,31,42,0.1);transform:translateY(-2px)}
  
  .btn-primary{background:var(--primary);color:white;transition:all .2s}
  .btn-primary:hover{background:var(--primary-dark);box-shadow:0 4px 12px rgba(107,31,42,0.3)}
  .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:white;transition:all .2s}
  .btn-gold:hover{box-shadow:0 4px 12px rgba(184,148,63,0.4)}
  .btn-outline{border:1.5px solid var(--border);background:white;color:var(--charcoal);transition:all .2s}
  .btn-outline:hover{border-color:var(--primary);color:var(--primary)}
  
  table.data-table{width:100%;border-collapse:collapse}
  table.data-table thead th{background:linear-gradient(180deg,var(--primary),var(--primary-light));color:white;padding:12px 14px;text-align:left;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
  table.data-table thead th:first-child{border-radius:8px 0 0 0}
  table.data-table thead th:last-child{border-radius:0 8px 0 0}
  table.data-table tbody td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px}
  table.data-table tbody tr{transition:background .15s}
  table.data-table tbody tr:hover{background:rgba(184,148,63,0.06)}
  table.data-table tbody tr:nth-child(even){background:rgba(250,247,240,0.5)}
  
  .modal-overlay{background:rgba(26,26,26,0.5);backdrop-filter:blur(4px)}
  .modal-content{animation:modalIn .25s ease}
  @keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
  
  .form-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;transition:all .15s;background:white;font-family:inherit}
  .form-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(107,31,42,0.1)}
  .form-label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
  
  .toast{animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards}
  @keyframes toastIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes toastOut{to{transform:translateX(400px);opacity:0}}
  
  .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
  .badge-gold{background:rgba(184,148,63,0.15);color:#8a6f2f}
  .badge-green{background:rgba(90,122,90,0.15);color:#3d5d3d}
  .badge-red{background:rgba(107,31,42,0.12);color:var(--primary)}
  .badge-blue{background:rgba(59,130,246,0.12);color:#1e40af}
  
  .kop-surat{border-bottom:3px double var(--primary);padding-bottom:12px;margin-bottom:8px}
  
  @media print{
    .no-print{display:none !important}
    .print-only{display:block !important}
    body{background:white}
    .print-container{box-shadow:none !important;border:none !important}
    @page{margin:1.5cm}
  }
  .print-only{display:none}
  
  .fade-in{animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  
  .category-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:12px 20px 6px}
  
  .stat-card{position:relative;overflow:hidden}
  .stat-card::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:0.08}
  .stat-card.burgundy::after{background:var(--primary)}
  .stat-card.gold::after{background:var(--gold)}
  .stat-card.sage::after{background:var(--sage)}
  .stat-card.blue::after{background:#3b82f6}
  
  .letter-preview{font-family:'Times New Roman',serif;line-height:1.8;font-size:13px}
  
  .icon-wrap{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

  /* ===== HAMBURGER BUTTON (mobile only) ===== */
  .hamburger-btn{display:none}
  .sidebar-overlay{display:none}

  /* ===== TABLET RESPONSIVE ===== */
  @media (max-width:1024px){
    .sidebar{width:260px}
    .modal-content{max-width:90%}
  }

  /* ===== MOBILE & TABLET OFF-CANVAS SIDEBAR ===== */
  @media (max-width:768px){
    .sidebar{
      position:fixed;
      top:0;left:0;bottom:0;
      z-index:50;
      transform:translateX(-100%);
      transition:transform .3s ease;
      box-shadow:2px 0 20px rgba(0,0,0,0.15);
    }
    .sidebar.open{transform:translateX(0)}
    .sidebar-overlay{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.4);
      z-index:40;
      backdrop-filter:blur(2px);
    }
    .sidebar-overlay.show{display:block}
    .hamburger-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:40px;height:40px;
      border-radius:8px;
      border:1.5px solid var(--border);
      background:white;
      color:var(--primary);
      cursor:pointer;
      flex-shrink:0;
    }
    .hamburger-btn:hover{background:var(--cream)}
  }

  /* ===== MOBILE SPECIFIC ===== */
  @media (max-width:640px){
    .header-actions{gap:6px}
    .header-btn-text{display:none}
    .header-btn{padding:8px 10px !important;font-size:13px}
    .header-title{font-size:18px !important}
    .header-subtitle{font-size:11px}
    
    .main-content-padding{padding:12px !important}
    .card-padding{padding:14px !important}
    
    .stat-card{padding:14px !important}
    .stat-card .font-serif{font-size:24px !important}
    .stat-icon-wrap{width:32px;height:32px;font-size:14px}
    
    .table-toolbar{flex-direction:column;align-items:stretch !important;gap:8px !important}
    .table-toolbar > div{width:100%}
    .search-input-wrap{max-width:100% !important}
    .table-actions{display:flex;gap:6px}
    .table-actions button{flex:1;padding:8px 6px !important;font-size:12px}
    .table-actions button i{margin:0 !important}
    .table-actions button span{display:none}
    
    table.data-table thead th{padding:8px 10px;font-size:10px}
    table.data-table tbody td{padding:8px 10px;font-size:12px}
    
    .modal-content{max-width:95% !important;max-height:95vh !important;border-radius:12px}
    .modal-header{padding:14px !important}
    .modal-title{font-size:16px !important}
    .modal-body{padding:14px !important}
    .modal-footer{padding:12px !important;flex-direction:column-reverse;gap:8px}
    .modal-footer button{width:100%}
    
    .modal-fields{grid-template-columns:1fr !important;gap:10px}
    
    .hero-padding{padding:16px !important}
    .hero-title{font-size:22px !important;line-height:1.2}
    .hero-text{font-size:12px !important}
    .hero-stats{gap:10px !important;font-size:10px !important}
    .hero-logo{width:60px !important;height:60px !important}
    
    .quick-access-grid{grid-template-columns:1fr !important;gap:8px}
    .quick-access-btn{padding:10px !important;font-size:12px}
    
    .category-grid{grid-template-columns:1fr !important}
    
    .letter-layout{grid-template-columns:1fr !important;gap:12px}
    .letter-form-card{padding:14px !important}
    .letter-preview{padding:16px !important;min-height:400px !important;font-size:11px}
    .letter-preview .kop-surat{gap:8px !important}
    .letter-preview .kop-surat > div:first-child,
    .letter-preview .kop-surat > div:last-child{width:50px !important;height:50px !important}
    .letter-preview .kop-surat > div:nth-child(2){font-size:10px !important}
    .letter-preview .kop-surat > div:nth-child(2) > div:first-child{font-size:10px !important}
    .letter-preview .kop-surat > div:nth-child(2) > div:nth-child(2){font-size:11px !important}
    .letter-preview .kop-surat > div:nth-child(2) > div:nth-child(3){font-size:10px !important}
    
    .settings-grid{grid-template-columns:1fr !important}
    .settings-card{padding:14px !important}
    
    .toast{font-size:12px;padding:10px 14px;max-width:calc(100vw - 24px)}
    
    .stat-grid{grid-template-columns:repeat(2,1fr) !important;gap:10px}
    
    .page-title{font-size:18px !important}
    .page-subtitle{font-size:11px}
    
    .sidebar-footer{padding:10px !important}
    .sidebar-footer .text-xs{font-size:10px}
    
    .data-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    
    .record-count{font-size:11px}
    
    .empty-state-icon{font-size:36px !important}
    .empty-state-text{font-size:13px !important}
  }

  /* ===== TOUCH OPTIMIZATION ===== */
  @media (hover:none) and (pointer:coarse){
    .sidebar-link{padding:14px 20px}
    .sidebar-link i{font-size:14px}
    .btn-primary,.btn-gold,.btn-outline{padding:10px 16px}
    .card-hover:hover{transform:none;box-shadow:0 1px 3px rgba(107,31,42,0.04)}
    table.data-table tbody tr:hover{background:transparent}
  }

  /* ===== SCROLLBAR HIDE ON MOBILE ===== */
  @media (max-width:640px){
    .scrollbar-thin::-webkit-scrollbar{width:3px;height:3px}
  }

  /* ===== SAFE AREA FOR NOTCH ===== */
  @supports (padding:max(0px)){
    @media (max-width:768px){
      .header-bar{padding-left:max(12px,env(safe-area-inset-left));padding-right:max(12px,env(safe-area-inset-right))}
      .sidebar{padding-top:env(safe-area-inset-top)}
    }
  }
</style>

// ============= STORAGE =============
const STORAGE_PREFIX = 'lingkungan_st_theofilus_';

function loadData(sectionId) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + sectionId);
    return raw ? JSON.parse(raw) : getDefaultData(sectionId);
  } catch { return []; }
}

function saveDataToStorage(sectionId, data) {
  localStorage.setItem(STORAGE_PREFIX + sectionId, JSON.stringify(data));
}

// ============= SIDEBAR =============
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  
  const dashLink = document.createElement('a');
  dashLink.href = '#';
  dashLink.className = 'sidebar-link flex items-center gap-3 px-5 py-2.5 text-sm font-medium';
  dashLink.innerHTML = `<i class="fas fa-gauge-high w-5 text-center" style="color:var(--gold)"></i> Dashboard`;
  dashLink.onclick = (e) => { e.preventDefault(); showSection('dashboard'); };
  nav.appendChild(dashLink);
  
  CATEGORIES.forEach(cat => {
    if (cat.items.length === 0) return;
    
    const catDiv = document.createElement('div');
    catDiv.innerHTML = `<div class="category-header">${cat.title}</div>`;
    
    cat.items.forEach(item => {
      const link = document.createElement('a');
      link.href = '#';
      link.className = 'sidebar-link flex items-center gap-3 px-5 py-2 text-sm';
      link.dataset.section = item.id;
      link.innerHTML = `<i class="fas ${item.icon} w-5 text-center text-xs" style="color:var(--muted)"></i> <span class="truncate">${item.title}</span>`;
      link.onclick = (e) => { e.preventDefault(); showSection(item.id); };
      catDiv.appendChild(link);
    });
    
    nav.appendChild(catDiv);
  });
  
  const settingsDiv = document.createElement('div');
  settingsDiv.innerHTML = `
    <div class="category-header">Pengaturan</div>
    <a href="#" class="sidebar-link flex items-center gap-3 px-5 py-2 text-sm" onclick="event.preventDefault();showSection('settings');">
      <i class="fas fa-gear w-5 text-center text-xs" style="color:var(--muted)"></i> <span>Sinkronisasi & Backup</span>
    </a>
  `;
  nav.appendChild(settingsDiv);
}

// ============= SHOW SECTION =============
function showSection(sectionId) {
  currentSection = sectionId;
  
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  const activeLink = document.querySelector(`[data-section="${sectionId}"]`);
  if (activeLink) activeLink.classList.add('active');
  
  const content = document.getElementById('mainContent');
  content.innerHTML = '';
  
  if (sectionId === 'dashboard') {
    renderDashboard(content);
    document.getElementById('pageTitle').textContent = 'Dashboard';
    document.getElementById('pageSubtitle').textContent = 'Ringkasan Administrasi Lingkungan';
  } else if (sectionId === 'settings') {
    renderSettings(content);
    document.getElementById('pageTitle').textContent = 'Pengaturan';
    document.getElementById('pageSubtitle').textContent = 'Sinkronisasi & Backup Data';
  } else if (ALL_SECTIONS[sectionId]) {
    const section = ALL_SECTIONS[sectionId];
    document.getElementById('pageTitle').textContent = section.title;
    document.getElementById('pageSubtitle').textContent = CONFIG.lingkunganShort;
    
    if (section.isLetter) {
      renderLetterTemplate(content, section);
    } else {
      renderTableSection(content, section);
    }
  }
  
  // Auto close sidebar on mobile after selection
  if (window.innerWidth <= 768) {
    closeSidebar();
  }
}

// ============= MODAL =============
function openModal(sectionId, editId = null) {
  const section = ALL_SECTIONS[sectionId];
  editingId = editId;
  
  document.getElementById('modalTitle').textContent = editId ? 'Edit Data' : `Tambah ${section.title}`;
  
  const fieldsContainer = document.getElementById('modalFields');
  fieldsContainer.innerHTML = '';
  
  let existingData = {};
  if (editId) {
    const data = loadData(sectionId);
    existingData = data.find(r => r._id === editId) || {};
  }
  
  section.fields.forEach(field => {
    const isFullWidth = field.type === 'textarea';
    const div = document.createElement('div');
    div.className = isFullWidth ? 'md:col-span-2' : '';
    
    let inputHtml = '';
    const val = existingData[field.name] || '';
    
    if (field.type === 'textarea') {
      inputHtml = `<textarea name="${field.name}" class="form-input" rows="3">${escapeHtml(val)}</textarea>`;
    } else if (field.type === 'select') {
      inputHtml = `<select name="${field.name}" class="form-input">
        <option value="">Pilih...</option>
        ${field.options.map(o => `<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}
      </select>`;
    } else {
      inputHtml = `<input type="${field.type}" name="${field.name}" value="${escapeHtml(val)}" class="form-input">`;
    }
    
    div.innerHTML = `<label class="form-label">${field.label}</label>${inputHtml}`;
    fieldsContainer.appendChild(div);
  });
  
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal').classList.add('flex');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.getElementById('modal').classList.remove('flex');
  editingId = null;
}

function saveData(event) {
  event.preventDefault();
  const section = ALL_SECTIONS[currentSection];
  const formData = new FormData(event.target);
  const newData = {};
  section.fields.forEach(f => {
    newData[f.name] = formData.get(f.name);
  });
  
  const data = loadData(section.id);
  
  if (editingId) {
    const idx = data.findIndex(r => r._id === editingId);
    if (idx >= 0) {
      newData._id = editingId;
      data[idx] = newData;
    }
  } else {
    newData._id = generateId();
    data.push(newData);
  }
  
  saveDataToStorage(section.id, data);
  closeModal();
  showSection(currentSection);
  showToast(editingId ? 'Data berhasil diperbarui' : 'Data berhasil ditambahkan', 'success');
}

function deleteRow(sectionId, rowId) {
  if (!confirm('Yakin ingin menghapus data ini?')) return;
  let data = loadData(sectionId);
  data = data.filter(r => r._id !== rowId);
  saveDataToStorage(sectionId, data);
  showSection(currentSection);
  showToast('Data berhasil dihapus', 'success');
}

function filterTable(sectionId, query) {
  const tbody = document.getElementById('tableBody');
  if (!tbody) return;
  const rows = tbody.querySelectorAll('tr');
  const q = query.toLowerCase();
  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    row.style.display = text.includes(q) ? '' : 'none';
  });
}

function saveLetter(sectionId, type) {
  const data = getLetterFormData();
  const existing = loadData(sectionId);
  
  const editingLetter = document.getElementById('letterForm').dataset.editingId;
  
  if (editingLetter) {
    const idx = existing.findIndex(r => r._id === editingLetter);
    if (idx >= 0) {
      data._id = editingLetter;
      existing[idx] = data;
    }
    delete document.getElementById('letterForm').dataset.editingId;
  } else {
    data._id = generateId();
    existing.push(data);
  }
  
  saveDataToStorage(sectionId, existing);
  updateLetterPreview(type);
  showToast('Surat berhasil disimpan', 'success');
  
  const section = ALL_SECTIONS[sectionId];
  renderLetterTemplate(document.getElementById('mainContent'), section);
}

function loadLetter(sectionId, letterId, type) {
  const data = loadData(sectionId);
  const letter = data.find(r => r._id === letterId);
  if (!letter) return;
  
  Object.keys(letter).forEach(key => {
    if (key === '_id') return;
    const input = document.querySelector(`#letterForm [name="${key}"]`);
    if (input) input.value = letter[key];
  });
  
  document.getElementById('letterForm').dataset.editingId = letterId;
  updateLetterPreview(type);
  showToast('Surat dimuat untuk diedit', 'info');
}

function printLetter(type) {
  const preview = document.getElementById('letterPreview');
  if (!preview) return;
  
  const printArea = document.getElementById('printArea');
  printArea.innerHTML = `<div class="print-container" style="padding:30px;background:white;max-width:800px;margin:0 auto">${preview.innerHTML}</div>`;
  printArea.classList.remove('hidden');
  printArea.classList.add('print-only');
  
  window.print();
  
  setTimeout(() => {
    printArea.classList.add('hidden');
    printArea.classList.remove('print-only');
    printArea.innerHTML = '';
  }, 500);
}

  `;
  printArea.classList.remove('hidden');
  printArea.classList.add('print-only');
  
  window.print();
  
  setTimeout(() => {
    printArea.classList.add('hidden');
    printArea.classList.remove('print-only');
    printArea.innerHTML = '';
  }, 500);
}

// ============= SYNC FUNCTIONS =============
function saveWebAppUrl() {
  const url = document.getElementById('webAppUrl').value.trim();
  localStorage.setItem('webAppUrl', url);
  showToast('URL Web App disimpan', 'success');
}

async function syncToSheets() {
  const webAppUrl = localStorage.getItem('webAppUrl');
  if (!webAppUrl) {
    showToast('Setel URL Web App terlebih dahulu di Pengaturan', 'error');
    return;
  }
  
  showToast('Sedang sinkronisasi...', 'info');
  let success = 0, fail = 0;
  
  for (const sectionId of Object.keys(ALL_SECTIONS)) {
    const section = ALL_SECTIONS[sectionId];
    if (section.isLetter) continue;
    const data = loadData(sectionId);
    try {
      await fetch(webAppUrl, {
        method: 'POST',
        body: JSON.stringify({ sheet: section.title, rows: data })
      });
      success++;
    } catch (e) {
      fail++;
    }
  }
  
  showToast(`Sync selesai: ${success} berhasil, ${fail} gagal`, success > 0 ? 'success' : 'error');
}

// ============= UTILITY FUNCTIONS =============
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substring(2, 7);
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
  } catch { return dateStr; }
}

function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  const colors = {
    success: 'bg-green-600',
    error: 'bg-red-600',
    info: 'bg-blue-600'
  };
  const icons = {
    success: 'fa-check-circle',
    error: 'fa-exclamation-circle',
    info: 'fa-info-circle'
  };
  toast.className = `toast ${colors[type]} text-white px-4 md:px-5 py-2 md:py-3 rounded-lg shadow-lg text-sm font-medium flex items-center gap-2`;
  toast.innerHTML = `<i class="fas ${icons[type]}"></i>${message}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function exportCSV(sectionId) {
  const section = ALL_SECTIONS[sectionId];
  const data = loadData(sectionId);
  
  if (data.length === 0) {
    showToast('Tidak ada data untuk diekspor', 'error');
    return;
  }
  
  const headers = section.fields.map(f => f.label);
  const rows = data.map(row => section.fields.map(f => `"${(row[f.name]||'').toString().replace(/"/g,'""')}"`));
  
  const csv = [headers.map(h => `"${h}"`).join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `${section.title}_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  
  showToast('CSV berhasil diunduh', 'success');
}

function exportAllData() {
  const allData = {};
  Object.keys(ALL_SECTIONS).forEach(id => {
    allData[id] = loadData(id);
  });
  allData._meta = { exportDate: new Date().toISOString(), config: CONFIG };
  
  const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `backup_lingkungan_st_theofilus_${new Date().toISOString().slice(0,10)}.json`;
  link.click();
  
  showToast('Backup berhasil diunduh', 'success');
}

function importAllData(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      Object.keys(data).forEach(key => {
        if (key === '_meta') return;
        localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(data[key]));
      });
      showToast('Data berhasil dipulihkan', 'success');
      showSection(currentSection);
    } catch (err) {
      showToast('File backup tidak valid', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearAllData() {
  if (!confirm('PERINGATAN: Semua data lokal akan dihapus permanen. Pastikan sudah backup. Lanjutkan?')) return;
  Object.keys(localStorage).forEach(key => {
    if (key.startsWith(STORAGE_PREFIX)) localStorage.removeItem(key);
  });
  showToast('Semua data lokal dihapus', 'success');
  showSection('dashboard');
}

});

    closeModal();

});
